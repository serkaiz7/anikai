<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anikai - Stream Premium Anime</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="#" class="logo" onclick="window.location.reload()">Ani<span>kai</span></a>
            
            <div class="search-bar-container">
                <input type="text" id="search-input" placeholder="Search anime like in animekai...">
                <button id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="right-nav">
                <div class="token-badge">
                    <i class="fa-solid fa-bolt token-icon"></i>
                    <span id="token-count">3</span> Energy
                </div>
            </div>
        </div>
    </header>

    <main class="main-layout">
        <section class="content-area">
            
            <div id="player-view" class="view-section hidden">
                <div class="player-container">
                    <div class="video-wrapper">
                        <div id="video-lock-screen" class="video-overlay">
                            <div class="lock-content">
                                <i class="fa-solid fa-shield-halved lock-icon"></i>
                                <h3>Unlock Premium Stream</h3>
                                <p>This episode requires <span class="highlight">1 Energy Token</span> to buffer source.</p>
                                <button id="unlock-btn" class="action-btn"><i class="fa-solid fa-key"></i> Unlock Stream</button>
                            </div>
                        </div>
                        <iframe id="main-player-frame" src="" allowfullscreen></iframe>
                    </div>
                    <div class="player-details">
                        <h2 id="player-title">Anime Title Loading...</h2>
                        <div class="episode-selection-zone">
                            <h3>Episodes</h3>
                            <div class="episodes-grid" id="episodes-box"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="home-view" class="view-section">
                <h2 class="grid-heading">Discovered Titles</h2>
                <div class="anime-grid" id="catalog-grid">
                    </div>
            </div>

        </section>

        <aside class="sidebar-zone">
            <div class="ad-card-wrapper">
                <h3><i class="fa-solid fa-circle-dollar-to-slot"></i> Refill Station</h3>
                <p>Running low on streaming energy? Watch an ad banner below to collect points.</p>
                
                <div class="ad-box-display" id="ad-frame-container">
                    <div id="ad-idle">
                        <i class="fa-solid fa-video ad-placeholder-icon"></i>
                        <p>Video Ad Ready</p>
                    </div>
                    <div id="ad-active" class="hidden">
                        <div class="loader-circle"></div>
                        <p>Watching Advertisement... <span id="ad-countdown">10</span>s</p>
                    </div>
                </div>

                <button id="trigger-ad-btn" class="ad-action-button">Watch Sponsored Video (+2 Tokens)</button>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
